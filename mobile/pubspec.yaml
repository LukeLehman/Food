name: ishi_mobile
description: ISHI Flutter App for Anemia Detection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  http_parser: ^4.0.2
  intl: ^0.18.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
