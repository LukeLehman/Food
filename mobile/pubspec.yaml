name: ishi_mobile
description: ISHI Flutter App for Anemia Detection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  http_parser: ^4.0.2
  intl: ^0.18.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0
  webview_flutter: ^4.7.0
  # isar: ^3.1.0+1
  # isar_flutter_libs: ^3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  # build_runner: ^2.4.13
  # isar_generator: ^3.1.0+1

# --- flutter_launcher_icons CONFIG (top-level) ---
flutter_launcher_icons:
  android: true
  ios: true

  # Fallback for iOS & older Android
  image_path: assets/logo.png

  # Adaptive (Android 8+)
  adaptive_icon_background: "#FFFFFF"        # or a brand hex
  adaptive_icon_foreground: assets/logo.png
  adaptive_icon_monochrome: assets/logo.png

  remove_alpha_ios: true
  min_sdk_android: 21

# --- flutter_native_splash CONFIG (top-level) ---
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  android_12:
    color: "#FFFFFF"
    image: assets/logo.png
  web: false


flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
