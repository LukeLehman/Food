name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter clean
        working-directory: mobile
        run: flutter clean

      # Make sure gradle.properties has the Flutter overrides
      - name: Enforce compileSdk for all plugins
        working-directory: mobile/android
        run: |
          {
            echo "android.useAndroidX=true"
            echo "android.enableJetifier=true"
            echo "flutter.compileSdkVersion=35"
            echo "flutter.minSdkVersion=21"
            echo "flutter.targetSdkVersion=35"
            echo "flutter.ndkVersion=27.0.12077973"
          } >> gradle.properties
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Get packages (no upgrades)
        working-directory: mobile
        run: flutter pub get

      # Patch isar_flutter_libs 3.1.0+1 manifest for AGP 8
      - name: Patch isar_flutter_libs manifest
        run: |
          MF="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/src/main/AndroidManifest.xml"
          if [ -f "$MF" ]; then
            sed -i 's/package="dev.isar.isar_flutter_libs"//g' "$MF"
            echo "Patched: $MF"
          else
            echo "Manifest not found at $MF"
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platforms & build tools
        run: |
          sdkmanager "platforms;android-31" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Android NDK 27
        run: sdkmanager "ndk;27.0.12077973"

      - name: Run Isar codegen
        working-directory: mobile
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/ishi_upload.jks
          cat > mobile/android/key.properties <<EOF
          storeFile=$HOME/ishi_upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://ishi-api.onrender.com \
            --dart-define=MIN_APP_VERSION=1.0.0 \
            --dart-define=APP_STORE_URL=https://ironstronginitiative.com/app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Verify native libs are present
        run: |
          unzip -l mobile/build/app/outputs/flutter-apk/app-release.apk | grep -E "lib/(arm64-v8a|armeabi-v7a|x86_64)/libisar\.so" || true
          echo "If nothing printed above, libisar.so is missing!"
