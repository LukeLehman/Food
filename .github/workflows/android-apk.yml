name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      # Optional caches (you can comment these out if you want a fully "clean" run)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter clean
        working-directory: mobile
        run: flutter clean

      # Force compile/target/min for all subprojects via local.properties (AGP 8 uses this in Flutter plugin)
      - name: Set SDK levels in local.properties
        working-directory: mobile/android
        run: |
          sed -i '/^flutter.compileSdkVersion/d' local.properties || true
          sed -i '/^flutter.targetSdkVersion/d'  local.properties || true
          sed -i '/^flutter.minSdkVersion/d'     local.properties || true
          echo "flutter.compileSdkVersion=35" >> local.properties
          echo "flutter.targetSdkVersion=35"  >> local.properties
          echo "flutter.minSdkVersion=21"     >> local.properties
          echo "local.properties ----"
          cat local.properties

      - name: Get packages
        working-directory: mobile
        run: flutter pub get

      # If you must stay on 3.x, uncomment this patch block instead of the upgrade above.
      # - name: Patch isar_flutter_libs manifest (AGP 8 fix)
      #   run: |
      #     MF="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/src/main/AndroidManifest.xml"
      #     if [ -f "$MF" ]; then
      #       sed -i 's/package="dev.isar.isar_flutter_libs"//g' "$MF"
      #       echo "Patched $MF (removed package attr)"
      #     fi

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/ishi_upload.jks
          cat > mobile/android/key.properties <<EOF
          storeFile=$HOME/ishi_upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      # Install platforms: 35 (your compileSdk) AND 31 (covers libs that reference lStar)
      - name: Install Android platforms & build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platforms;android-31"

      - name: Install Android NDK 27
        run: sdkmanager "ndk;27.0.12077973"

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://ishi-api.onrender.com \
            --dart-define=MIN_APP_VERSION=1.0.0 \
            --dart-define=APP_STORE_URL=https://ironstronginitiative.com/app

      - name: Upload APK artifact (overwrite)
        uses: actions/upload-artifact@v4
        with:
          name: app-release           # same name each run
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          overwrite: true             # <---- overwrite instead of piling up
          retention-days: 14          # optional: keep for 14 days

