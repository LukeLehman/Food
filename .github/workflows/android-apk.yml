name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main, aakash1454-dev ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      # Optional caches
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter clean
        working-directory: mobile
        run: flutter clean

      # Force compile/target/min for all subprojects via local.properties (AGP 8)
      - name: Set SDK levels in local.properties
        working-directory: mobile/android
        run: |
          sed -i '/^flutter.compileSdkVersion/d' local.properties || true
          sed -i '/^flutter.targetSdkVersion/d'  local.properties || true
          sed -i '/^flutter.minSdkVersion/d'     local.properties || true
          echo "flutter.compileSdkVersion=35" >> local.properties
          echo "flutter.targetSdkVersion=35"  >> local.properties
          echo "flutter.minSdkVersion=21"     >> local.properties
          echo "local.properties ----"
          cat local.properties

      - name: Get packages
        working-directory: mobile
        run: flutter pub get

      # Keystore restore using your ANDROID_* secret names
      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/ishi_upload.jks
          cat > mobile/android/key.properties <<EOF
          storeFile=$HOME/ishi_upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Verify keystore (hash + keytool)
        run: |
          ls -lh $HOME/ishi_upload.jks
          sha256sum $HOME/ishi_upload.jks
          keytool -list \
          -keystore $HOME/ishi_upload.jks \
          -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
          -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      # Install platforms: API 35 (compile) + tools (keep 31 if some libs reference it)
      - name: Install Android platforms & build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platforms;android-31"

      - name: Install Android NDK 27
        run: sdkmanager "ndk;27.0.12077973"

      - name: Generate launcher icons
        working-directory: mobile
        run: flutter pub run flutter_launcher_icons

      - name: Generate native splash
        working-directory: mobile
        run: flutter pub run flutter_native_splash:create

      # ---------- APK (for sideload testing) ----------
      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://ishi-api.onrender.com \
            --dart-define=MIN_APP_VERSION=1.0.0 \
            --dart-define=APP_STORE_URL=https://ironstronginitiative.com/app

      - name: Upload APK artifact (overwrite)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          overwrite: true
          retention-days: 14

      # ---------- AAB (required for Google Play) ----------
      - name: Build release AAB
        working-directory: mobile
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://ishi-api.onrender.com \
            --dart-define=MIN_APP_VERSION=1.0.0 \
            --dart-define=APP_STORE_URL=https://ironstronginitiative.com/app

      - name: Upload AAB artifact (overwrite)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          overwrite: true
          retention-days: 14
