name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      # (Optional) caches to speed up builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter clean
        working-directory: mobile
        run: flutter clean      

      - name: Upgrade Isar libs
        working-directory: mobile
        run: |
          flutter pub upgrade isar_flutter_libs
          flutter pub upgrade isar isar_generator
        
      - name: Get packages
        working-directory: mobile
        run: flutter pub get

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/ishi_upload.jks
          cat > mobile/android/key.properties <<EOF
          storeFile=$HOME/ishi_upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform 35 + Build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Android NDK 27
        run: sdkmanager "ndk;27.0.12077973"

      # >>> IMPORTANT for Isar: generate *.g.dart files in CI
      - name: Run Isar codegen
        working-directory: mobile
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://ishi-api.onrender.com \
            --dart-define=MIN_APP_VERSION=1.0.0 \
            --dart-define=APP_STORE_URL=https://ironstronginitiative.com/app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
      
      - name: Verify native libs are present
        run: |
          unzip -l mobile/build/app/outputs/flutter-apk/app-release.apk | grep -E "lib/(arm64-v8a|armeabi-v7a|x86_64)/libisar\.so" || true
          echo "If nothing printed above, libisar.so is missing!"

